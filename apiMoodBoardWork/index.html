<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pinterest Board Test</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; margin: 0; padding: 20px; }
    h1 { font-size: 18px; }
    #status { margin: 10px 0; color: #aaa; font-size: 14px; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 20px; }
    #grid img { width: 100%; border-radius: 8px; display: block; background: #222; }
  </style>
</head>
<body>
  <h1>Test : tableau "Character Design"</h1>
  <div id="status">Chargement...</div>
  <div id="grid"></div>

  <script>
    // --- Réglages ---
    const username = "lucile1234567890";
    const boardSlug = "tatoo";
    // ----------------

    const rssUrl = "https://fr.pinterest.com/" + username + "/" + boardSlug + ".rss";
    // On passe par TON mini-serveur local (doit tourner via : node serveur.js)
    const proxyUrl = "http://localhost:3000/rss?url=" + encodeURIComponent(rssUrl);

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("grid");

    async function loadBoard() {
      try {
        const response = await fetch(proxyUrl);
        if (!response.ok) {
          statusEl.textContent = "Erreur serveur : " + response.status;
          return;
        }

        const xmlText = await response.text();
        const xml = new DOMParser().parseFromString(xmlText, "text/xml");
        const items = xml.querySelectorAll("item");

        if (items.length === 0) {
          statusEl.textContent = "Aucun pin trouvé dans le flux.";
          return;
        }

        let count = 0;
        items.forEach(item => {
          const description = item.querySelector("description");
          if (!description) return;
          const match = description.textContent.match(/<img src="([^"]+)"/);
          if (match) {
            const img = document.createElement("img");
            img.src = match[1].replace("/236x/", "/736x/");
            gridEl.appendChild(img);
            count++;
          }
        });

        statusEl.textContent = count + " image(s) chargée(s).";
      } catch (err) {
        statusEl.textContent = "Impossible de joindre le serveur local. Il tourne ? (node serveur.js)";
        console.error(err);
      }
    }

    loadBoard();
  </script>
</body>
</html>
