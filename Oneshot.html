<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Black Square</title>
</head>
<body>

  <canvas id="myCanva" width="400" height="400"></canvas>

  <script>

    var canvaGrab = document.getElementById("myCanva");
    var ctx = canvaGrab.getContext("2d");

    var mouseDrag = false;
    var clickedX = 0;
    var clickedY = 0;
    var movedX = 0;
    var movedY = 0;

    // PRESS → turn dragging ON, record start point
    document.addEventListener("mousedown", (clicked) => {
      mouseDrag = true;
      clickedX = clicked.clientX;
      clickedY = clicked.clientY;
    });

    // MOVE → just read the position and draw (do NOT touch mouseDrag)
    document.addEventListener("mousemove", (moved) => {
      movedX = moved.clientX;
      movedY = moved.clientY;
      draw();
    });

    // RELEASE → turn dragging OFF
    document.addEventListener("mouseup", () => {
      mouseDrag = false;
    });

    function draw() {
      if (mouseDrag) {
        var width = Math.abs(movedX - clickedX);
        var height = Math.abs(movedY - clickedY);

        var x = Math.min(clickedX, movedX);
        var y = Math.min(clickedY, movedY);

        ctx.clearRect(0, 0, 400, 400);
        ctx.fillStyle = "#000000";
        ctx.fillRect(x, y, width, height);
      }
      // if not dragging, draw() does nothing
    }

  </script>

</body>
</html>
