<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolbar Sandbox</title>
  <style>
    body {
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .sandbox-toolbar {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0px;
      background: #222;
      border-radius: 100px;
      box-shadow: -2px 2px 10px rgba(0, 0, 0, 0.4);
    }

    .highlight {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 100%;
      background: #ffa800;
      box-shadow: -2px 2px 4px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: top 0.25s ease, opacity 0.2s ease;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    /* the passing light streak */
    .highlight::before {
      content: "";
      position: absolute;
      top: 0;
      left: -60%;
      width: 40%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(255, 255, 255, 0.7) 50%,
        transparent 100%
      );
      transform: skewX(-20deg);
    }

    .highlight.show::before {
      animation: sweep 0.6s ease;
    }

    @keyframes sweep {
      from { left: -60%; }
      to   { left: 120%; }
    }

    .sandbox-toolbar span {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 100%;
      background: transparent;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="sandbox-toolbar" id="toolbar">
    <div class="highlight" id="highlight"></div>
    <span id="colorPicker"></span>
    <span id="spiral"></span>
    <span id="thirdGrid"></span>
    <span id="fourthGrid"></span>
  </div>

  <script src="jsScript/toolbar/pencil.js"></script>
  <script src="jsScript/toolbar/colorPicker.js"></script>
  <script src="jsScript/toolbar/palette.js"></script>
  <script src="jsScript/toolbar/spiral.js"></script>
  <script src="jsScript/toolbar/thirdGrid.js"></script>
  <script src="jsScript/toolbar/fourthGrid.js"></script>

  <script>
    const toolbar = document.getElementById("toolbar");
    const highlight = document.getElementById("highlight");
    const icons = toolbar.querySelectorAll("span");

    icons.forEach((icon) => {
      icon.addEventListener("mouseenter", () => {
        highlight.style.top = icon.offsetTop + "px";
        highlight.style.left = icon.offsetLeft + "px";
        highlight.style.opacity = "1";
      });

      icon.addEventListener("click", () => {
        highlight.classList.remove("show");
        void highlight.offsetWidth;
        highlight.classList.add("show");
      });
    });

    toolbar.addEventListener("mouseleave", () => {
      highlight.style.opacity = "0";
    });
  </script>
</body>
</html>
